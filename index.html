<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>99 Food Hub - Menu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --orange: #e8722a;
            --orange-light: #fdf0e8;
            --green: #2e7d32;
            --red: #c62828;
            --bg: #fafafa;
            --card-bg: #fff;
            --text: #333;
            --text-light: #777;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--orange), #d4611f);
            color: #fff;
            padding: 24px 16px 80px;
            text-align: center;
            position: relative;
        }
        .header h1 { font-size: 2rem; font-weight: 800; letter-spacing: 1px; }
        .header p { font-size: 0.85rem; opacity: 0.9; margin-top: 4px; }
        .header .address { font-size: 0.75rem; opacity: 0.75; margin-top: 8px; }

        /* Search bar */
        .search-wrap {
            position: relative;
            max-width: 560px;
            margin: -40px auto 0;
            padding: 0 16px;
            z-index: 10;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: #fff;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            overflow: hidden;
            padding: 4px 16px;
        }
        .search-box svg { width: 20px; height: 20px; color: #999; flex-shrink: 0; }
        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            padding: 14px 12px;
            font-size: 1rem;
            background: transparent;
        }
        .search-box .clear-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #999;
            cursor: pointer;
            padding: 4px 8px;
            display: none;
        }
        .search-box .clear-btn.show { display: block; }

        /* Filter bar */
        .filter-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            max-width: 560px;
            margin: 0 auto;
            flex-wrap: wrap;
        }
        .filter-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 50px;
            border: 2px solid #ddd;
            background: #fff;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .filter-btn:hover { border-color: #bbb; }
        .filter-btn.active-all { border-color: var(--orange); background: var(--orange-light); color: var(--orange); }
        .filter-btn.active-veg { border-color: var(--green); background: #e8f5e9; color: var(--green); }
        .filter-btn.active-nonveg { border-color: var(--red); background: #ffebee; color: var(--red); }
        .filter-btn .dot {
            width: 14px; height: 14px; border-radius: 3px; border: 2px solid;
            display: flex; align-items: center; justify-content: center;
        }
        .filter-btn .dot::after {
            content: ''; width: 7px; height: 7px; border-radius: 50%;
        }
        .dot-veg { border-color: var(--green) !important; }
        .dot-veg::after { background: var(--green) !important; }
        .dot-nonveg { border-color: var(--red) !important; }
        .dot-nonveg::after { background: var(--red) !important; }

        /* Category nav - Desktop: horizontal pills */
        .cat-nav {
            position: sticky;
            top: 0;
            z-index: 20;
            background: #fff;
            border-bottom: 1px solid #eee;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding: 10px 0;
            mask-image: linear-gradient(to right, transparent 0, #000 16px, #000 calc(100% - 16px), transparent 100%);
            -webkit-mask-image: linear-gradient(to right, transparent 0, #000 16px, #000 calc(100% - 16px), transparent 100%);
        }
        .cat-nav::-webkit-scrollbar { display: none; }
        .cat-nav-inner {
            display: flex;
            padding: 0 20px;
            gap: 8px;
            min-width: max-content;
        }
        .cat-nav-btn {
            padding: 8px 16px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-light);
            background: #f3f3f3;
            border: 2px solid transparent;
            border-radius: 50px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        .cat-nav-btn:hover { background: #eee; color: var(--text); }
        .cat-nav-btn.active {
            color: var(--orange);
            background: var(--orange-light);
            border-color: var(--orange);
        }

        /* Mobile dropdown trigger - hidden on desktop */
        .cat-dropdown-trigger {
            display: none;
        }

        /* Mobile dropdown panel */
        .cat-dropdown-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 99;
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
            transition: opacity 0.25s, visibility 0.25s;
        }
        .cat-dropdown-overlay.show {
            opacity: 1;
            pointer-events: auto;
            visibility: visible;
        }
        .cat-dropdown-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #fff;
            border-radius: 20px 20px 0 0;
            max-height: 70vh;
            overflow-y: auto;
            transform: translateY(100%);
            pointer-events: none;
            visibility: hidden;
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1), visibility 0.3s;
            padding-bottom: env(safe-area-inset-bottom, 16px);
        }
        .cat-dropdown-panel.show {
            transform: translateY(0);
            pointer-events: auto;
            visibility: visible;
        }
        .cat-dropdown-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 8px;
            position: sticky;
            top: 0;
            background: #fff;
            border-radius: 20px 20px 0 0;
            z-index: 1;
        }
        .cat-dropdown-panel-header h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }
        .cat-dropdown-close {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: #f3f3f3;
            border: none;
            font-size: 1.2rem;
            color: var(--text-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cat-dropdown-handle {
            width: 36px; height: 4px;
            background: #ddd;
            border-radius: 4px;
            margin: 10px auto 0;
        }
        .cat-dropdown-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding: 8px 16px 20px;
        }
        .cat-dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            background: #f8f8f8;
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .cat-dropdown-item:active {
            transform: scale(0.97);
        }
        .cat-dropdown-item.active {
            background: var(--orange-light);
            border-color: var(--orange);
            color: var(--orange);
        }
        .cat-dropdown-item .cat-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: var(--orange-light);
            color: var(--orange);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 800;
            flex-shrink: 0;
        }
        .cat-dropdown-item.active .cat-icon {
            background: var(--orange);
            color: #fff;
        }

        /* Mobile: swap horizontal nav for dropdown trigger */
        @media (max-width: 600px) {
            .cat-nav {
                display: none;
            }
            .cat-dropdown-trigger {
                display: flex;
                position: sticky;
                top: 0;
                z-index: 20;
                align-items: center;
                justify-content: space-between;
                background: #fff;
                border-bottom: 1px solid #eee;
                padding: 10px 16px;
                cursor: pointer;
                -webkit-tap-highlight-color: transparent;
            }
            .cat-dropdown-trigger-left {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .cat-dropdown-trigger-label {
                font-size: 0.7rem;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: var(--text-light);
                font-weight: 500;
            }
            .cat-dropdown-trigger-value {
                font-size: 0.85rem;
                font-weight: 700;
                color: var(--orange);
            }
            .cat-dropdown-trigger-arrow {
                width: 28px; height: 28px;
                border-radius: 50%;
                background: var(--orange-light);
                display: flex;
                align-items: center;
                justify-content: center;
                transition: transform 0.25s;
            }
            .cat-dropdown-trigger-arrow svg {
                width: 14px; height: 14px; color: var(--orange);
            }
            .cat-dropdown-trigger.open .cat-dropdown-trigger-arrow {
                transform: rotate(180deg);
            }
        }

        /* Item count */
        .item-count {
            text-align: center;
            padding: 12px 16px 4px;
            font-size: 0.8rem;
            color: var(--text-light);
        }

        /* Content */
        .content { max-width: 720px; margin: 0 auto; padding: 8px 16px 100px; }

        /* Category section */
        .category {
            margin-bottom: 8px;
        }
        .cat-header {
            position: sticky;
            top: 52px;
            z-index: 5;
            background: var(--orange);
            color: #fff;
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .cat-header .cat-count {
            font-size: 0.7rem;
            background: rgba(255,255,255,0.25);
            padding: 2px 10px;
            border-radius: 50px;
            font-weight: 500;
        }

        /* Menu item card */
        .menu-item {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 8px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: transform 0.15s;
        }
        .menu-item:active { transform: scale(0.99); }

        .veg-badge {
            width: 18px; height: 18px; border-radius: 3px;
            border: 2px solid; display: flex; align-items: center;
            justify-content: center; flex-shrink: 0; margin-top: 2px;
        }
        .veg-badge::after {
            content: ''; width: 9px; height: 9px; border-radius: 50%;
        }
        .veg-badge.veg { border-color: var(--green); }
        .veg-badge.veg::after { background: var(--green); }
        .veg-badge.nonveg { border-color: var(--red); }
        .veg-badge.nonveg::after { background: var(--red); }

        .item-info { flex: 1; min-width: 0; }
        .item-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 2px;
        }
        .item-desc {
            font-size: 0.78rem;
            color: var(--text-light);
            font-style: italic;
            margin-bottom: 6px;
        }
        .item-prices { display: flex; flex-wrap: wrap; gap: 6px; }
        .price-tag {
            background: var(--orange-light);
            color: var(--orange);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .price-label {
            font-weight: 500;
            color: #999;
            font-size: 0.72rem;
            margin-right: 2px;
        }

        /* No results */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            display: none;
        }
        .no-results.show { display: block; }
        .no-results svg { width: 64px; height: 64px; color: #ddd; margin-bottom: 16px; }
        .no-results h3 { color: var(--text-light); font-size: 1.1rem; }
        .no-results p { color: #bbb; font-size: 0.85rem; margin-top: 4px; }

        /* Back to top */
        .back-top {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--orange);
            color: #fff;
            border: none;
            box-shadow: 0 4px 16px rgba(232,114,42,0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            z-index: 30;
        }
        .back-top.show { opacity: 1; transform: translateY(0); }
        .back-top svg { width: 22px; height: 22px; }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.75rem;
            color: #bbb;
        }

        /* Smooth hidden */
        .hidden { display: none !important; }

        /* Responsive */
        @media (max-width: 600px) {
            .header h1 { font-size: 1.5rem; }
            .menu-item { padding: 12px; }
            .item-name { font-size: 0.88rem; }
            .cat-header { font-size: 0.88rem; padding: 10px 16px; top: 56px; }
        }

        /* Highlight matching text */
        mark {
            background: #fff3cd;
            color: var(--text);
            padding: 0 2px;
            border-radius: 2px;
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .menu-item { animation: fadeIn 0.3s ease; }
    </style>
</head>

<div class="header">

</div>

<div class="content" id="menuContent"></div>

<div class="no-results" id="noResults">

<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">

let currentFilter = 'all';
let currentSearch = '';
let dropdownOpen = false;

const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
const menuContent = document.getElementById('menuContent');
const noResults = document.getElementById('noResults');
const catNavInner = document.getElementById('catNavInner');
const itemCountEl = document.getElementById('itemCount');
const backTop = document.getElementById('backTop');
const catDropdownTrigger = document.getElementById('catDropdownTrigger');
const catDropdownValue = document.getElementById('catDropdownValue');
const catDropdownOverlay = document.getElementById('catDropdownOverlay');
const catDropdownPanel = document.getElementById('catDropdownPanel');
const catDropdownGrid = document.getElementById('catDropdownGrid');

// Build desktop category nav
function buildCatNav() {
    catNavInner.innerHTML = '';
    menuData.forEach((cat, i) => {
        const btn = document.createElement('button');
        btn.className = 'cat-nav-btn';
        btn.textContent = cat.cat;
        btn.dataset.catIndex = i;
        btn.onclick = () => scrollToCat(i);
        catNavInner.appendChild(btn);
    });
}

// Build mobile dropdown grid
function buildCatDropdown() {
    catDropdownGrid.innerHTML = '';
    menuData.forEach((cat, i) => {
        const item = document.createElement('button');
        item.className = 'cat-dropdown-item';
        item.dataset.catIndex = i;
        const initials = cat.cat.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
        item.innerHTML = `<span class="cat-icon">${initials}</span><span>${cat.cat}</span>`;
        item.onclick = () => {
            closeCatDropdown();
            setTimeout(() => scrollToCat(i), 300);
        };
        catDropdownGrid.appendChild(item);
    });
}

function scrollToCat(index) {
    const el = document.getElementById('cat-' + index);
    if (el) {
        const isMobile = window.innerWidth <= 600;
        const stickyHeight = isMobile
            ? catDropdownTrigger.offsetHeight + 8
            : document.getElementById('catNav').offsetHeight + 8;
        const top = el.getBoundingClientRect().top + window.scrollY - stickyHeight;
        window.scrollTo({ top, behavior: 'smooth' });
    }
}

function toggleCatDropdown() {
    dropdownOpen ? closeCatDropdown() : openCatDropdown();
}

function openCatDropdown() {
    dropdownOpen = true;
    catDropdownTrigger.classList.add('open');
    document.body.style.overflow = 'hidden';
    requestAnimationFrame(() => {
        catDropdownOverlay.classList.add('show');
        catDropdownPanel.classList.add('show');
    });
    updateDropdownActive();
}

function closeCatDropdown() {
    dropdownOpen = false;
    catDropdownTrigger.classList.remove('open');
    catDropdownOverlay.classList.remove('show');
    catDropdownPanel.classList.remove('show');
    document.body.style.overflow = '';
}

function updateDropdownActive() {
    const cats = document.querySelectorAll('.category');
    const triggerH = catDropdownTrigger.offsetHeight + 60;
    let activeIndex = -1;
    cats.forEach(cat => {
        if (cat.getBoundingClientRect().top <= triggerH + 10) {
            activeIndex = parseInt(cat.id.replace('cat-', ''));
        }
    });
    document.querySelectorAll('.cat-dropdown-item').forEach(item => {
        item.classList.toggle('active', parseInt(item.dataset.catIndex) === activeIndex);
    });
}

function highlightText(text, query) {
    if (!query) return text;
    const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return text.replace(regex, '<mark>$1</mark>');
}

function renderMenu() {
    const query = currentSearch.toLowerCase().trim();
    let html = '';
    let totalVisible = 0;

    menuData.forEach((cat, catIndex) => {
        const filteredItems = cat.items.filter(item => {
            const matchesFilter = currentFilter === 'all' || item.type === currentFilter;
            const matchesSearch = !query ||
                item.name.toLowerCase().includes(query) ||
                item.desc.toLowerCase().includes(query) ||
                cat.cat.toLowerCase().includes(query);
            return matchesFilter && matchesSearch;
        });

        if (filteredItems.length === 0) return;
        totalVisible += filteredItems.length;

        html += `<div class="category" id="cat-${catIndex}">`;
        html += `<div class="cat-header">
            <span>${cat.cat}</span>
            <span class="cat-count">${filteredItems.length} item${filteredItems.length > 1 ? 's' : ''}</span>
        </div>`;

        filteredItems.forEach(item => {
            const pricesHtml = item.prices.map(p =>
                `<span class="price-tag">${p.label ? `<span class="price-label">${p.label}</span> ` : ''}&#8377;${p.price}</span>`
            ).join('');

            html += `<div class="menu-item">
                <div class="veg-badge ${item.type}"></div>
                <div class="item-info">
                    <div class="item-name">${highlightText(item.name, query)}</div>
                    <div class="item-desc">${highlightText(item.desc, query)}</div>
                    <div class="item-prices">${pricesHtml}</div>
                </div>
            </div>`;
        });

        html += '</div>';
    });

    menuContent.innerHTML = html;
    itemCountEl.textContent = totalVisible > 0 ? `Showing ${totalVisible} item${totalVisible > 1 ? 's' : ''}` : '';
    noResults.classList.toggle('show', totalVisible === 0);

    updateActiveNav();
}

function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active-all', 'active-veg', 'active-nonveg');
        if (btn.dataset.filter === filter) {
            btn.classList.add(filter === 'all' ? 'active-all' : filter === 'veg' ? 'active-veg' : 'active-nonveg');
        }
    });
    renderMenu();
}

function clearSearch() {
    searchInput.value = '';
    currentSearch = '';
    clearBtn.classList.remove('show');
    renderMenu();
    searchInput.focus();
}

searchInput.addEventListener('input', (e) => {
    currentSearch = e.target.value;
    clearBtn.classList.toggle('show', currentSearch.length > 0);
    renderMenu();
});

// Active nav on scroll
function updateActiveNav() {
    // Desktop pills
    const navBtns = document.querySelectorAll('.cat-nav-btn');
    const cats = document.querySelectorAll('.category');
    const navEl = document.getElementById('catNav');
    const navHeight = (navEl.offsetHeight || 0) + 60;

    let activeIndex = -1;
    cats.forEach(cat => {
        const rect = cat.getBoundingClientRect();
        if (rect.top <= navHeight + 10) {
            activeIndex = parseInt(cat.id.replace('cat-', ''));
        }
    });

    navBtns.forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.catIndex) === activeIndex);
        if (parseInt(btn.dataset.catIndex) === activeIndex) {
            btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
    });

    // Mobile trigger label
    if (activeIndex >= 0 && activeIndex < menuData.length) {
        catDropdownValue.textContent = menuData[activeIndex].cat;
    } else {
        catDropdownValue.textContent = 'All Categories';
    }
}

window.addEventListener('scroll', () => {
    backTop.classList.toggle('show', window.scrollY > 400);
    updateActiveNav();
}, { passive: true });

// Init
buildCatNav();
buildCatDropdown();
renderMenu();
</script>
